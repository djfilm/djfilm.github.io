<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr' }}" dir="ltr">
<head>
  {% include head.html %}
  {% include seo-meta.html %}
  {% include schema.html %}
</head>
<body class="{% if page.body_class %}{{ page.body_class }}{% endif %}" data-page="{{ page.page_id | default: '' }}">

  <!-- Fond vivant — orbes lumineux organiques -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-orb bg-orb--4"></div>
    <div class="bg-orb bg-orb--5"></div>
  </div>

  {% include header.html %}

  <main id="main-content" tabindex="-1">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Modale vidéo — disponible sur toutes les pages -->
  <div class="video-modal" id="video-modal" role="dialog" aria-modal="true" aria-label="Lecteur vidéo" hidden>
    <div class="video-modal__backdrop" id="video-modal-backdrop"></div>
    <div class="video-modal__inner">
      <button class="video-modal__close" id="video-modal-close" type="button" aria-label="Fermer la vidéo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="video-modal__player">
        <video class="video-modal__video" id="video-modal-player" controls preload="metadata" hidden>
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
        <iframe
          class="video-modal__iframe"
          id="video-modal-iframe"
          src=""
          title="Lecteur vidéo"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          hidden
        ></iframe>
      </div>
    </div>
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
